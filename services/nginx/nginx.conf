user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Maximum allowed upload body size — should be >= MAX_SIZE in .env
    client_max_body_size 10M;

    # Enable gzip compression for text-based responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    upstream backend_upstream {
        server backend:8000;
    }

    # Reusable proxy header block (nginx doesn't support include inside location,
    # so the headers are repeated per block — extract with proxy_set_header in a
    # shared location block if using nginx Plus or a map)
    server {
        listen       80;
        server_name  localhost;

        # ------------------------------------------------------------------
        # Frontend static files (HTML, CSS, JS, images)
        # ------------------------------------------------------------------
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ =404;
        }

        # ------------------------------------------------------------------
        # API — Upload (POST)
        # ------------------------------------------------------------------
        location /upload/ {
            proxy_pass http://backend_upstream/upload/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — Image list (GET with query params)
        location /upload {
            proxy_pass http://backend_upstream/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — File metadata
        location /file_info/ {
            proxy_pass http://backend_upstream/file_info/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — All images (slideshow)
        location /all_images {
            proxy_pass http://backend_upstream/all_images;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — Image viewer page (Jinja2 template)
        location /view/ {
            proxy_pass http://backend_upstream/view/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — Health check
        location /health {
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Swagger UI and OpenAPI schema
        # Without these blocks, /docs and /openapi.json are served as static
        # files by nginx (returning 404) instead of being proxied to FastAPI.
        # ------------------------------------------------------------------
        location /docs {
            proxy_pass http://backend_upstream/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Uploaded images — served directly by nginx from the shared volume
        # (read-only; long-lived cache headers since filenames are unique)
        # ------------------------------------------------------------------
        location /images/ {
            alias /usr/src/app/images/;
            autoindex off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
